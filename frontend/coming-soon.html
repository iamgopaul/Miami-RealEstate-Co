<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Coming Soon — Revara Realty</title>
  <link rel="icon" type="image/png" sizes="256x256" href="media/logo/revara-realty-tab-logo.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 32px 24px;
    }

    img {
      height: 90px;
      width: auto;
      mix-blend-mode: screen;
      filter: invert(1) contrast(1.2);
    }

    .name {
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .name span { color: #C0C0C0; }

    .divider {
      width: 40px;
      height: 1px;
      background: #333;
    }

    .label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="media/logo/revara-realty-logo.png" alt="Revara Realty">
    <p class="name">Revara <span>Realty</span></p>
    <div class="divider"></div>
    <p class="label">Coming Soon</p>
  </div>
</body>
</html>
